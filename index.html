<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>MintoFit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #08080a;
        --bg-2: #0e0e11;
        --surface: #131316;
        --surface-2: #1b1b20;
        --surface-3: #25252c;
        --border: rgba(255, 255, 255, 0.06);
        --border-strong: rgba(255, 255, 255, 0.1);
        --border-bright: rgba(255, 255, 255, 0.16);
        --text: #f5f5f5;
        --text-2: #9a9aa3;
        --text-3: #5a5a62;
        --text-4: #3a3a40;
        --accent: #c6ff3d;
        --accent-2: #9fe800;
        --accent-text: #0a0a0b;
        --danger: #ff5a5f;
        --warn: #ffb547;
        --r-sm: 10px;
        --r-md: 14px;
        --r-lg: 20px;
        --r-xl: 28px;
        --r-full: 9999px;
        --font: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
        --font-mono: "Geist Mono", ui-monospace, monospace;
        /* Program colors */
        --day-a: #4ade80;
        --day-b: #60a5fa;
        --day-c: #c084fc;
        --day-d: #fbbf24;
        --day-light: #6b7280;
        --day-mix: #f472b6;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        font-size: 16px;
        line-height: 1.4;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior: none;
      }
      button {
        font-family: inherit;
        color: inherit;
      }
      input {
        font-family: inherit;
        color: inherit;
      }
      ::selection {
        background: var(--accent);
        color: var(--accent-text);
      }
      button,
      a,
      [role="button"] {
        -webkit-tap-highlight-color: transparent;
      }

      .stage {
        min-height: 100dvh;
        display: flex;
        align-items: stretch;
        justify-content: center;
        background:
          radial-gradient(
            1200px 600px at 50% -200px,
            rgba(198, 255, 61, 0.04),
            transparent 60%
          ),
          var(--bg);
      }
      .app {
        width: 100%;
        max-width: 440px;
        min-height: 100dvh;
        background: var(--bg);
        position: relative;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      @media (min-width: 520px) {
        .stage {
          padding: 24px 16px;
        }
        .app {
          min-height: min(900px, calc(100dvh - 48px));
          max-height: calc(100dvh - 48px);
          border-radius: 34px;
          border: 1px solid var(--border-strong);
          box-shadow:
            0 0 0 1px rgba(0, 0, 0, 0.5),
            0 40px 80px -20px rgba(0, 0, 0, 0.5);
          overflow: hidden;
        }
      }
      .screen {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 96px;
      }
      .screen::-webkit-scrollbar {
        width: 0;
      }

      /* Typography */
      .h-1 {
        font-size: 28px;
        font-weight: 600;
        letter-spacing: -0.02em;
        line-height: 1.1;
      }
      .h-2 {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.015em;
      }
      .h-3 {
        font-size: 17px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .label {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-3);
      }
      .meta {
        font-size: 13px;
        color: var(--text-2);
      }
      .num {
        font-family: var(--font-mono);
        font-variant-numeric: tabular-nums;
      }

      /* Topbar */
      .topbar {
        padding: max(env(safe-area-inset-top), 20px) 20px 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .topbar-title {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }
      .topbar-actions {
        display: flex;
        gap: 8px;
      }
      .icon-btn {
        width: 38px;
        height: 38px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text-2);
        cursor: pointer;
        transition:
          background 0.15s,
          color 0.15s;
        flex-shrink: 0;
      }
      .icon-btn:hover {
        background: var(--surface-2);
        color: var(--text);
      }
      .icon-btn:active {
        transform: scale(0.96);
      }

      /* Bottom Nav */
      .nav {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 10px 16px max(env(safe-area-inset-bottom), 16px);
        background: linear-gradient(
          to top,
          var(--bg) 60%,
          rgba(8, 8, 10, 0.7) 90%,
          transparent
        );
        display: flex;
        justify-content: center;
        pointer-events: none;
      }
      .nav-inner {
        pointer-events: auto;
        display: flex;
        align-items: center;
        justify-content: space-around;
        width: 100%;
        max-width: 360px;
        padding: 8px;
        background: rgba(19, 19, 22, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--border-strong);
        border-radius: var(--r-full);
        box-shadow: 0 12px 30px -10px rgba(0, 0, 0, 0.7);
      }
      .nav-btn {
        appearance: none;
        border: 0;
        background: transparent;
        color: var(--text-3);
        padding: 10px 14px;
        border-radius: var(--r-full);
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        transition:
          color 0.2s,
          background 0.2s;
      }
      .nav-btn[data-active="1"] {
        color: var(--accent-text);
        background: var(--accent);
      }
      .nav-btn .nav-label {
        display: none;
      }
      .nav-btn[data-active="1"] .nav-label {
        display: inline;
      }

      /* Cards */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        padding: 18px;
      }
      .card-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      /* Buttons */
      .btn {
        appearance: none;
        border: 0;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 14px 20px;
        border-radius: var(--r-full);
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.005em;
        transition:
          transform 0.12s ease,
          background 0.15s,
          opacity 0.15s;
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn-primary {
        background: var(--accent);
        color: var(--accent-text);
        box-shadow: 0 8px 20px -8px rgba(198, 255, 61, 0.5);
      }
      .btn-primary:hover {
        background: #d6ff52;
      }
      .btn-ghost {
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border-strong);
      }
      .btn-ghost:hover {
        background: var(--surface-2);
      }
      .btn-dark {
        background: var(--surface-3);
        color: var(--text);
      }
      .btn-block {
        width: 100%;
      }
      .btn-sm {
        padding: 10px 14px;
        font-size: 13px;
      }

      /* Chips */
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px;
        border-radius: var(--r-full);
        background: var(--surface-2);
        border: 1px solid var(--border);
        font-size: 12px;
        color: var(--text-2);
        font-weight: 500;
      }
      .chip-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
      }

      /* Stats */
      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }
      .stat {
        padding: 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-md);
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .stat-label {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-3);
      }
      .stat-value {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      .stat-sub {
        font-size: 11px;
        color: var(--text-2);
      }
      .stat-up {
        color: var(--accent);
      }

      /* Program selection cards — home screen */
      .prog-select-card {
        border-radius: var(--r-lg);
        border: 1px solid var(--border);
        background: var(--surface);
        padding: 16px 18px;
        display: flex;
        align-items: center;
        gap: 14px;
        cursor: pointer;
        transition:
          border-color 0.15s,
          background 0.15s,
          transform 0.12s;
        width: 100%;
        text-align: left;
        appearance: none;
      }
      .prog-select-card:hover {
        border-color: var(--border-bright);
        background: var(--surface-2);
      }
      .prog-select-card:active {
        transform: scale(0.98);
      }
      .prog-color-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .prog-icon {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        font-size: 20px;
        flex-shrink: 0;
      }
      .prog-divider {
        height: 1px;
        background: var(--border);
        margin: 4px 0;
      }

      /* Workout exercise cards */
      .ex-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r-lg);
        overflow: hidden;
      }
      .ex-card[data-done="1"] {
        opacity: 0.6;
      }
      .ex-head {
        padding: 16px 18px 12px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }
      .ex-machine-photo {
        width: 52px;
        height: 52px;
        border-radius: 10px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        display: grid;
        place-items: center;
        color: var(--text-3);
        flex-shrink: 0;
        overflow: hidden;
      }
      .ex-machine-photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .ex-name {
        font-size: 16px;
        font-weight: 600;
        color: var(--text);
        letter-spacing: -0.01em;
      }
      .ex-note {
        font-size: 12px;
        color: var(--text-3);
        margin-top: 2px;
      }
      .ex-table {
        padding: 0 18px 14px;
      }
      .ex-row {
        display: grid;
        grid-template-columns: 28px 64px 1fr 1fr 36px;
        align-items: center;
        gap: 8px;
        padding: 8px 0;
        border-top: 1px solid var(--border);
      }
      .ex-row:first-child {
        border-top: 0;
      }
      .ex-row-head {
        color: var(--text-3);
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 500;
        padding: 4px 0;
        border-top: 0;
      }
      .set-num {
        width: 24px;
        height: 24px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: var(--surface-2);
        color: var(--text-2);
        font-size: 12px;
        font-weight: 600;
      }
      .ex-row[data-done="1"] .set-num {
        background: var(--accent);
        color: var(--accent-text);
      }
      .set-last {
        font-size: 12px;
        color: var(--text-3);
        text-align: center;
      }
      .set-input {
        appearance: none;
        border: 0;
        background: transparent;
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 15px;
        font-weight: 500;
        text-align: center;
        width: 100%;
        padding: 8px 4px;
        border-radius: 8px;
        outline: none;
      }
      .set-input:focus {
        background: var(--surface-2);
      }
      .set-input::placeholder {
        color: var(--text-4);
      }
      .set-check {
        width: 32px;
        height: 32px;
        border-radius: 10px;
        border: 1.5px solid var(--border-bright);
        background: transparent;
        display: grid;
        place-items: center;
        cursor: pointer;
        color: var(--text-3);
        transition: all 0.15s;
      }
      .set-check[data-done="1"] {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--accent-text);
      }

      /* Ex card footer — youtube + notes + alt */
      .ex-footer {
        padding: 10px 18px 14px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 8px;
      }
      .ex-action-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 8px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        font-size: 12px;
        color: var(--text-2);
        cursor: pointer;
        appearance: none;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .ex-action-btn:hover {
        background: var(--surface-3);
        color: var(--text);
      }
      .alt-panel {
        padding: 12px 18px 14px;
        border-top: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.02);
      }
      .note-panel {
        padding: 10px 18px 14px;
        border-top: 1px solid var(--border);
      }
      .note-input {
        width: 100%;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
        color: var(--text);
        font-size: 13px;
        resize: none;
        outline: none;
        font-family: var(--font);
      }
      .note-input:focus {
        border-color: var(--border-bright);
      }
      .note-input::placeholder {
        color: var(--text-3);
      }

      /* Rest timer */
      .timer-bar {
        margin: 0 0 14px;
        padding: 14px 18px;
        background: linear-gradient(
          135deg,
          rgba(198, 255, 61, 0.18),
          rgba(198, 255, 61, 0.06)
        );
        border: 1px solid rgba(198, 255, 61, 0.3);
        border-radius: var(--r-lg);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        overflow: hidden;
        position: relative;
      }
      .timer-bar::after {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: var(--p, 0%);
        background: rgba(198, 255, 61, 0.08);
        transition: width 1s linear;
      }
      .timer-bar > * {
        position: relative;
        z-index: 1;
      }
      .timer-bar .num {
        font-size: 24px;
        font-weight: 600;
        color: var(--accent);
      }
      .finish-bar {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 14px 20px max(env(safe-area-inset-bottom), 20px);
        background: linear-gradient(
          to top,
          var(--bg) 50%,
          rgba(8, 8, 10, 0.85) 85%,
          transparent
        );
        z-index: 5;
      }

      /* GitHub-style tracker */
      .tracker-grid {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .tracker-row {
        display: flex;
        gap: 3px;
      }
      .tracker-cell {
        width: 16px;
        height: 16px;
        border-radius: 3px;
        flex-shrink: 0;
        background: var(--surface-2);
        border: 1px solid var(--border);
        transition: transform 0.1s;
      }
      .tracker-cell:hover {
        transform: scale(1.3);
        z-index: 1;
        position: relative;
      }
      .tracker-cell[data-a] {
        background: var(--day-a);
        border-color: transparent;
        box-shadow: 0 0 6px rgba(74, 222, 128, 0.4);
      }
      .tracker-cell[data-b] {
        background: var(--day-b);
        border-color: transparent;
        box-shadow: 0 0 6px rgba(96, 165, 250, 0.4);
      }
      .tracker-cell[data-c] {
        background: var(--day-c);
        border-color: transparent;
        box-shadow: 0 0 6px rgba(192, 132, 252, 0.4);
      }
      .tracker-cell[data-d] {
        background: var(--day-d);
        border-color: transparent;
        box-shadow: 0 0 6px rgba(251, 191, 36, 0.4);
      }
      .tracker-cell[data-light] {
        background: var(--day-light);
        border-color: transparent;
      }
      .tracker-cell[data-mix] {
        background: var(--day-mix);
        border-color: transparent;
        box-shadow: 0 0 6px rgba(244, 114, 182, 0.4);
      }
      .tracker-legend {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 10px;
      }
      .tracker-legend-item {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 11px;
        color: var(--text-2);
      }
      .tracker-legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 3px;
        flex-shrink: 0;
      }

      /* Body stats graph area */
      .stat-switcher {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .stat-chip {
        padding: 5px 12px;
        border-radius: var(--r-full);
        border: 1px solid var(--border);
        background: var(--surface-2);
        font-size: 12px;
        color: var(--text-2);
        cursor: pointer;
        transition: all 0.15s;
        appearance: none;
      }
      .stat-chip[data-active="1"] {
        background: rgba(198, 255, 61, 0.12);
        color: var(--accent);
        border-color: rgba(198, 255, 61, 0.3);
      }

      /* PR rows */
      .pr-row {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 0;
        border-top: 1px solid var(--border);
      }
      .pr-row:first-child {
        border-top: 0;
      }
      .pr-icon {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        background: var(--surface-2);
        display: grid;
        place-items: center;
        color: var(--text-2);
        flex-shrink: 0;
      }
      .pr-row[data-fresh="1"] .pr-icon {
        background: rgba(198, 255, 61, 0.12);
        color: var(--accent);
        box-shadow: inset 0 0 0 1px rgba(198, 255, 61, 0.3);
      }
      .pr-weight {
        font-family: var(--font-mono);
        font-size: 18px;
        font-weight: 600;
        color: var(--text);
        text-align: right;
      }
      .pr-weight small {
        font-size: 11px;
        font-weight: 400;
        color: var(--text-3);
        margin-left: 2px;
      }
      .pr-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--accent-text);
        background: var(--accent);
        padding: 2px 6px;
        border-radius: 6px;
      }

      /* Programs screen */
      .program-card {
        border-radius: var(--r-lg);
        border: 1px solid var(--border);
        background: var(--surface);
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        cursor: pointer;
        transition:
          border-color 0.15s,
          transform 0.12s;
      }
      .program-card:hover {
        border-color: var(--border-strong);
      }
      .program-type-section {
        margin-top: 4px;
      }

      /* Summary */
      .summary {
        padding: 40px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        flex: 1;
        justify-content: center;
      }
      .summary-check {
        width: 88px;
        height: 88px;
        border-radius: 50%;
        background: var(--accent);
        color: var(--accent-text);
        display: grid;
        place-items: center;
        box-shadow: 0 16px 40px -10px rgba(198, 255, 61, 0.5);
      }
      .summary-stats {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .summary-stat {
        padding: 18px;
        border-radius: var(--r-lg);
        background: var(--surface);
        border: 1px solid var(--border);
      }

      /* Bar chart */
      .bar-chart {
        display: flex;
        align-items: flex-end;
        gap: 5px;
        height: 120px;
        padding: 8px 0 0;
      }
      .bar-col {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        height: 100%;
      }
      .bar-wrap {
        flex: 1;
        width: 100%;
        display: flex;
        align-items: flex-end;
        border-radius: 5px;
        overflow: hidden;
        background: var(--surface-2);
      }
      .bar {
        width: 100%;

        const weeks = [];
        const seq = ["a", "b", "c", "d", null, "a", "b"];
        for (let w = 0; w < 16; w++) {
          const days = [];
          for (let d = 0; d < 7; d++) {
            const val =
              w < 14 && d < 5 && Math.random() > 0.3
                ? seq[(w * 7 + d) % 7]
                : null;
            days.push(val);
          }
          weeks.push(days);
        }
        weeks[15][1] = null;
        weeks[15][2] = null;
        weeks[15][3] = null;

      // ── Helpers ───────────────────────────────────────────────────────────────
      function fmtSec(s) {
        const h = Math.floor(s / 3600),
          m = Math.floor((s % 3600) / 60),
          sec = s % 60;
        if (h > 0)
          return `${h}:${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
        return `${m}:${String(sec).padStart(2, "0")}`;
      }
      function fmtDate(d = new Date()) {
        const days = ["Нд", "Пн", "Вт", "Ср", "Чт", "Пт", "Сб"];
        const months = [
          "січ",
          "лют",
          "бер",
          "кві",
          "тра",
          "чер",
          "лип",
          "сер",
          "вер",
          "жов",
          "лис",
          "гру",
        ];
        return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]}`;
      }

      // ── Workout Screen ────────────────────────────────────────────────────────
      function WorkoutScreen({ program, onExit, onFinish }) {
        const [setData, setSetData] = useState(() => {
          const init = {};
          program.exercises.forEach((ex) =>
            ex.sets.forEach((s, i) => {
              init[`${ex.id}:${i}`] = { weight: s.w, reps: s.r, done: false };
            }),
          );
          return init;
        });
        const [elapsed, setElapsed] = useState(0);
        const [rest, setRest] = useState({
          active: false,
          total: 0,
          remaining: 0,
        });
        const [openAlt, setOpenAlt] = useState({});
        const [openNote, setOpenNote] = useState({});
        const [notes, setNotes] = useState({});

        useEffect(() => {
          const t = setInterval(() => setElapsed((s) => s + 1), 1000);
          return () => clearInterval(t);
        }, []);
        useEffect(() => {
          if (!rest.active) return;
          const t = setInterval(
            () =>
              setRest((r) => {
                if (!r.active) return r;
                const next = r.remaining - 1;
                if (next <= 0) return { active: false, total: 0, remaining: 0 };
                return { ...r, remaining: next };
              }),
            1000,
          );
          return () => clearInterval(t);
        }, [rest.active]);

        const toggleSet = (exId, idx, restSec) => {
          const key = `${exId}:${idx}`;
          const cur = setData[key];
          setSetData((s) => ({ ...s, [key]: { ...cur, done: !cur.done } }));
          if (!cur.done && restSec > 0)
            setRest({ active: true, total: restSec, remaining: restSec });
          // Vibrate if available
          if (!cur.done && navigator.vibrate) navigator.vibrate(40);
        };
        const updateSet = (exId, idx, field, val) => {
          const key = `${exId}:${idx}`;
          setSetData((s) => ({ ...s, [key]: { ...s[key], [field]: val } }));
        };

        const total = Object.keys(setData).length;
        const done = Object.values(setData).filter((s) => s.done).length;
        const progress = total ? done / total : 0;

        const handleFinish = () => {
          const vol = Object.values(setData)
            .filter((s) => s.done)
            .reduce((n, s) => n + (s.weight || 0) * (s.reps || 0), 0);
          onFinish({ duration: elapsed, done, total, volume: vol, program });
        };

        return (
          <div className="screen" style={{ paddingBottom: 120 }}>

                  gap: 2,

                  {program.name} · {program.desc}
                </div>
                <div className="num" style={{ fontSize: 18, fontWeight: 600 }}>
                  {fmtSec(elapsed)}
                </div>
              </div>
              <button className="icon-btn">
                <IcoMore size={18} />
              </button>
            </div>

            {/* Progress bar */}
            <div className="px" style={{ paddingTop: 12, paddingBottom: 12 }}>
              <div
                style={{
                  height: 4,
                  borderRadius: 4,
                  background: "var(--surface-2)",
                  overflow: "hidden",
                }}
              >
                <div
                  style={{
                    width: `${Math.round(progress * 100)}%`,
                    height: "100%",
                    background:
                      "linear-gradient(90deg,var(--accent-2),var(--accent))",
                    transition: "width .3s",
                  }}
                />
              </div>
              <div
                style={{
                  display: "flex",
                  justifyContent: "space-between",
                  marginTop: 8,
                  fontSize: 11,
                  color: "var(--text-3)",
                  letterSpacing: "0.05em",
                  textTransform: "uppercase",
                }}
              >
                <span>
                  {done} з {total} підходів
                </span>
                <span className="num">{Math.round(progress * 100)}%</span>
              </div>
            </div>

            {/* Rest timer */}
            {rest.active && (
              <div className="px">
                <div
                  className="timer-bar"
                  style={{
                    "--p": `${rest.total ? Math.max(0, 100 - (rest.remaining / rest.total) * 100) : 0}%`,
                  }}
                >
                  <div>
                    <div
                      className="label"
                      style={{ color: "rgba(198,255,61,0.85)" }}
                    >
                      Відпочинок
                    </div>
                    <div className="num">{fmtSec(rest.remaining)}</div>
                  </div>
                  <div style={{ display: "flex", gap: 6 }}>
                    <button
                      className="btn btn-sm btn-dark"
                      onClick={() =>
                        setRest((r) => ({ ...r, remaining: r.remaining + 15 }))

                      style={{ padding: "8px 12px", borderRadius: 10 }}
                    >
                      +15с
                    </button>
                    <button
                      className="btn btn-sm btn-dark"
                      onClick={() =>
                        setRest({ active: false, total: 0, remaining: 0 })
                      }
                      style={{ padding: "8px 12px", borderRadius: 10 }}
                    >
                      Пропустити
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* Exercises */}
            <div className="px stack" style={{ gap: 12 }}>
              {program.exercises.map((ex, idx) => {
                const allDone = ex.sets.every(
                  (_, i) => setData[`${ex.id}:${i}`]?.done,

                return (
                  <div
                    key={ex.id}
                    className="ex-card"
                    data-done={allDone ? "1" : "0"}
                  >
                    {/* Head */}
                    <div className="ex-head">
                      <div
                        style={{
                          display: "flex",
                          gap: 12,
                          alignItems: "flex-start",
                          flex: 1,
                        }}
                      >
                        <div className="ex-machine-photo">
                          <IcoDumbbell
                            size={24}
                            style={{ color: "var(--text-3)" }}
                          />
                        </div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div className="ex-name">{ex.name}</div>
                          <div className="ex-note">{ex.machine}</div>
                          {ex.note && (
                            <div
                              className="ex-note"
                              style={{
                                marginTop: 2,
                                color: "var(--text-4)",
                                fontSize: 11,

                            >
                              💡 {ex.note}
                            </div>

                        </div>
                      </div>
                      <button
                        className="icon-btn"
                        style={{ width: 32, height: 32, borderRadius: 10 }}
                      >
                        <IcoMore size={16} />
                      </button>
                    </div>

                    {/* Sets table */}
                    <div className="ex-table">
                      <div className="ex-row ex-row-head">
                        <div>#</div>
                        <div>Минулого</div>
                        <div>Вага</div>
                        <div>Повт.</div>
                        <div />
                      </div>
                      {ex.sets.map((s, i) => {
                        const key = `${ex.id}:${i}`;
                        const st = setData[key];
                        return (
                          <div
                            key={i}
                            className="ex-row"
                            data-done={st.done ? "1" : "0"}
                          >
                            <div className="set-num">{i + 1}</div>
                            <div className="set-last">
                              {s.w > 0
                                ? `${s.w}×${s.r}`
                                : s.r > 60
                                  ? `${s.r}хв`
                                  : `${s.r}повт`}
                            </div>
                            <input
                              className="set-input"
                              type="text"
                              inputMode="decimal"
                              value={st.weight || ""}
                              placeholder={s.w > 0 ? String(s.w) : "—"}
                              onChange={(e) =>
                                updateSet(
                                  ex.id,
                                  i,
                                  "weight",
                                  Number(e.target.value.replace(",", ".")) || 0,
                                )
                              }
                            />
                            <input
                              className="set-input"
                              type="text"
                              inputMode="numeric"
                              value={st.reps || ""}
                              placeholder={String(s.r)}
                              onChange={(e) =>
                                updateSet(
                                  ex.id,
                                  i,
                                  "reps",
                                  Number(e.target.value) || 0,
                                )
                              }
                            />
                            <button
                              className="set-check"
                              data-done={st.done ? "1" : "0"}
                              onClick={() => toggleSet(ex.id, i, ex.rest || 60)}
                            >
                              {st.done && <IcoCheck size={16} sw={2.6} />}
                            </button>
                          </div>
                        );
                      })}
                    </div>

                    {/* Footer — YouTube, Notes, Alt */}
                    <div className="ex-footer">
                      {ex.youtube && (
                        <button
                          className="ex-action-btn"
                          onClick={() => window.open(ex.youtube, "_blank")}

                          <IcoYoutube size={13} /> Відео
                        </button>

                        className="ex-action-btn"
                        onClick={() =>
                          setOpenNote((n) => ({ ...n, [ex.id]: !n[ex.id] }))

                      >
                        <IcoNote size={13} /> Нотатки
                      </button>

                        <button
                          className="ex-action-btn"
                          onClick={() =>
                            setOpenAlt((a) => ({ ...a, [ex.id]: !a[ex.id] }))
                          }
                        >
                          <IcoSwap size={13} />{" "}
                          {openAlt[ex.id] ? "Закрити" : "Замінити"}

                    {/* Notes panel */}
                    {openNote[ex.id] && (
                      <div className="note-panel">
                        <div className="label" style={{ marginBottom: 6 }}>
                          Мої налаштування
                        </div>
                        <textarea
                          className="note-input"
                          rows={2}

                          value={notes[ex.id] || ""}

                            setNotes((n) => ({ ...n, [ex.id]: e.target.value }))

                      </div>

                    {/* Alt panel */}

                      <div className="alt-panel">
                        <div className="label" style={{ marginBottom: 6 }}>

                            {ex.alt}

            <div className="finish-bar">

      // ── Progress Screen ───────────────────────────────────────────────────────
      const TRACKER_COLORS = {
        a: "var(--day-a)",
        b: "var(--day-b)",
        c: "var(--day-c)",
        d: "var(--day-d)",
        light1: "var(--day-light)",
        light2: "var(--day-light)",
        mix1: "var(--day-mix)",
        mix2: "var(--day-mix)",
        mix3: "var(--day-mix)",

      };
      const PROGRAM_NAMES = {
        a: "День А",
        b: "День Б",
        c: "День В",
        d: "День Г",
        light1: "Легке",
        light2: "Легке",
        mix1: "Мікс",

          { id: "weight", label: "Вага" },
          { id: "waist", label: "Талія" },
          { id: "hips", label: "Стегна" },

        const statData = BODY_STATS.map((d) => ({

        const streakWeeks = 4;

                <div className="card-row" style={{ marginBottom: 12 }}>
                  <div>
                    <div className="h-3">Відвідування</div>
                    <div className="meta" style={{ marginTop: 2 }}>
                      16 тижнів
                    </div>
                  </div>
                </div>
                {/* Day labels */}
                <div style={{ display: "flex", gap: 3, marginBottom: 3 }}>
                  <div
                    style={{ width: 20, fontSize: 9, color: "var(--text-3)" }}
                  />
                  {DAYS_SHORT.map((d) => (
                    <div
                      key={d}
                      style={{
                        width: 16,
                        fontSize: 9,
                        color: "var(--text-3)",
                        textAlign: "center",
                        fontWeight: 500,
                      }}
                    >
                      {d}
                    </div>
                  ))}
                </div>
                {/* Grid */}
                <div className="tracker-grid">
                  {TRACKER.map((week, wi) => (
                    <div
                      key={wi}
                      className="tracker-row"
                      style={{ alignItems: "center" }}
                    >
                      <div
                        style={{
                          width: 20,
                          fontSize: 9,
                          color: "var(--text-3)",
                          flexShrink: 0,
                        }}
                      >
                        {wi % 4 === 0 ? `Т${wi + 1}` : ""}
                      </div>
                      {week.map((day, di) => {
                        const attrs = {};
                        if (day === "a") attrs["data-a"] = "";
                        else if (day === "b") attrs["data-b"] = "";
                        else if (day === "c") attrs["data-c"] = "";
                        else if (day === "d") attrs["data-d"] = "";
                        else if (day && day.startsWith("light"))
                          attrs["data-light"] = "";
                        else if (day && day.startsWith("mix"))
                          attrs["data-mix"] = "";
                        return (
                          <div
                            key={di}
                            className="tracker-cell"
                            {...attrs}
                            title={
                              day
                                ? `${PROGRAM_NAMES[day] || day}`
                                : "Відпочинок"
                            }
                          />
                        );
                      })}
                    </div>
                  ))}
                </div>
                {/* Legend */}
                <div className="tracker-legend">
                  {[
                    { label: "Тренування 1", color: "var(--day-a)" },
                    { label: "Тренування 2", color: "var(--day-b)" },
                    { label: "Тренування 3", color: "var(--day-c)" },
                    { label: "Тренування 4", color: "var(--day-d)" },
                    { label: "Легке", color: "var(--day-light)" },
                    { label: "Мікс", color: "var(--day-mix)" },
                  ].map((l) => (
                    <div key={l.label} className="tracker-legend-item">
                      <div
                        className="tracker-legend-dot"
                        style={{ background: l.color }}
                      />
                      {l.label}
                    </div>
                  ))}
                </div>
              </div>

              {/* Body stats graph */}
              <div className="card">
                <div className="card-row" style={{ marginBottom: 12 }}>
                  <div>
                    <div className="h-3">Заміри тіла</div>
                    <div className="meta" style={{ marginTop: 2 }}>
                      6 місяців
                    </div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div
                      className="num"
                      style={{ fontSize: 22, fontWeight: 600 }}
                    >
                      {statData[statData.length - 1]?.value}
                      <span
                        style={{
                          fontSize: 13,
                          color: "var(--text-3)",
                          marginLeft: 3,
                        }}
                      >
                        {activeStat === "weight" ? "кг" : "см"}
                      </span>
                    </div>
                    <div className="meta stat-up" style={{ fontSize: 12 }}>
                      ↓{" "}
                      {(
                        statData[0]?.value -
                        statData[statData.length - 1]?.value
                      ).toFixed(1)}
                      {activeStat === "weight" ? "кг" : "см"}
                    </div>
                  </div>
                </div>
                {/* Switcher */}
                <div className="stat-switcher">
                  {statKeys.map((k) => (
                    <button
                      key={k.id}
                      className="stat-chip"
                      data-active={activeStat === k.id ? "1" : "0"}
                      onClick={() => setActiveStat(k.id)}
                    >
                      {k.label}
                    </button>
                  ))}
                </div>
                {/* Chart */}
                <BodyLineChart data={statData} />
              </div>

              {/* PRs */}
              <div>
                <div className="section-head" style={{ marginBottom: 8 }}>
                  <div className="label">Особисті рекорди</div>
                </div>
                <div className="card" style={{ padding: "0 18px" }}>
                  {PRS.map((pr, i) => (
                    <div
                      key={i}
                      className="pr-row"
                      data-fresh={pr.fresh ? "1" : "0"}
                    >
                      <div className="pr-icon">
                        <IcoTrophy size={18} />
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div
                          style={{
                            display: "flex",
                            alignItems: "center",
                            gap: 6,
                          }}
                        >
                          <div style={{ fontSize: 15, fontWeight: 500 }}>
                            {pr.ex}
                          </div>
                          {pr.fresh && <span className="pr-badge">NEW</span>}
                        </div>
                        <div style={{ fontSize: 12, color: "var(--text-3)" }}>
                          {pr.when}
                        </div>
                      </div>
                      <div className="pr-weight">
                        {pr.weight}
                        <small>кг × {pr.reps}</small>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        );
      }

      function BodyLineChart({ data }) {
        const W = 320,
          H = 120,
          P = 16;
        const vals = data.map((d) => d.value);
        const min = Math.min(...vals) - 1,
          max = Math.max(...vals) + 1;
        const xStep = (W - P * 2) / (data.length - 1);
        const pts = data.map((d, i) => ({
          x: P + i * xStep,
          y: P + (1 - (d.value - min) / (max - min)) * (H - P * 2),
          label: d.date,
          val: d.value,
        }));
        const pathD = pts.reduce((acc, p, i, arr) => {
          if (i === 0) return `M ${p.x} ${p.y}`;
          const prev = arr[i - 1],
            cpx = (prev.x + p.x) / 2;
          return acc + ` C ${cpx} ${prev.y}, ${cpx} ${p.y}, ${p.x} ${p.y}`;
        }, "");
        const areaD =
          pathD +
          ` L ${pts[pts.length - 1].x} ${H - P} L ${pts[0].x} ${H - P} Z`;
        return (
          <div style={{ position: "relative", height: H, width: "100%" }}>
            <svg
              viewBox={`0 0 ${W} ${H}`}
              width="100%"
              height="100%"
              preserveAspectRatio="none"
              style={{ overflow: "visible" }}
            >
              <defs>
                <linearGradient id="bodyFill" x1="0" y1="0" x2="0" y2="1">
                  <stop
                    offset="0%"
                    stopColor="var(--accent)"
                    stopOpacity="0.25"
                  />
                  <stop
                    offset="100%"
                    stopColor="var(--accent)"
                    stopOpacity="0"
                  />
                </linearGradient>
              </defs>
              {[0, 0.5, 1].map((t, i) => (
                <line
                  key={i}
                  x1={P}
                  x2={W - P}
                  y1={P + t * (H - P * 2)}
                  y2={P + t * (H - P * 2)}
                  stroke="var(--border)"
                  strokeDasharray="2 4"
                />
              ))}
              <path d={areaD} fill="url(#bodyFill)" />
              <path
                d={pathD}
                fill="none"
                stroke="var(--accent)"
                strokeWidth="2"
                strokeLinecap="round"
              />
              {pts.map((p, i) => (
                <g key={i}>
                  {i === pts.length - 1 && (
                    <circle
                      cx={p.x}
                      cy={p.y}
                      r="6"
                      fill="var(--accent)"
                      opacity="0.25"
                    />
                  )}
                  <circle
                    cx={p.x}
                    cy={p.y}
                    r={i === pts.length - 1 ? 4 : 2.5}
                    fill={
                      i === pts.length - 1 ? "var(--accent)" : "var(--text-2)"
                    }
                  />
                </g>
              ))}
            </svg>
            <div
              style={{
                display: "flex",
                justifyContent: "space-between",
                marginTop: 6,
                padding: "0 4px",
              }}
            >
              {pts.map((p, i) => (
                <div
                  key={i}
                  style={{
                    fontSize: 10,
                    color: "var(--text-3)",
                    fontWeight: i === pts.length - 1 ? 600 : 500,
                  }}
                >
                  {p.label}
                </div>
              ))}
            </div>
          </div>
        );
      }

      // ── Programs Screen ───────────────────────────────────────────────────────
      function ProgramsScreen({ onStart }) {
        const mainProgs = PROGRAMS.filter((p) => p.type === "main");
        const lightProgs = PROGRAMS.filter((p) => p.type === "light");
        const mixProgs = PROGRAMS.filter((p) => p.type === "mix");

        return (
          <div className="screen">
            <Topbar title="Програми" subtitle={`${PROGRAMS.length} програм`} />
            <div className="px stack" style={{ paddingTop: 6, gap: 20 }}>
              <ProgramSection
                title="Основні — 4 дні на тиждень"
                programs={mainProgs}
                onStart={onStart}
              />
              <ProgramSection
                title="Легкі"
                programs={lightProgs}
                onStart={onStart}
              />
              <ProgramSection
                title="Міксові"
                programs={mixProgs}
                onStart={onStart}
              />
            </div>
          </div>
        );
      }

      function ProgramSection({ title, programs, onStart }) {
        return (
          <div>
            <div className="section-head" style={{ marginBottom: 10 }}>
              <div className="label">{title}</div>
            </div>
            <div className="stack" style={{ gap: 10 }}>
              {programs.map((p) => (
                <div
                  key={p.id}
                  className="program-card"
                  style={{
                    background:
                      p.type === "main"
                        ? `radial-gradient(80% 70% at 100% 0%,${p.color}14,transparent),var(--surface)`
                        : "var(--surface)",
                    borderColor:
                      p.type === "main" ? `${p.color}40` : "var(--border)",
                  }}
                >
                  <div className="card-row">
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div
                        style={{
                          display: "flex",
                          alignItems: "center",
                          gap: 8,
                        }}
                      >
                        <span style={{ fontSize: 20 }}>{p.emoji}</span>
                        <div className="h-2">{p.name}</div>
                        <div
                          style={{
                            width: 8,
                            height: 8,
                            borderRadius: "50%",
                            background: p.color,
                            flexShrink: 0,
                          }}
                        />
                      </div>
                      <div className="meta" style={{ marginTop: 4 }}>
                        {p.desc}
                      </div>
                    </div>
                    <button
                      className="icon-btn"
                      style={{ width: 32, height: 32, borderRadius: 10 }}
                    >
                      <IcoMore size={16} />
                    </button>
                  </div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {p.exercises.map((ex, i) => (
                      <span
                        key={i}
                        style={{
                          padding: "4px 8px",
                          background: "var(--bg-2,var(--surface-2))",
                          border: "1px solid var(--border)",
                          borderRadius: 6,
                          fontSize: 11,
                          color: "var(--text-2)",
                        }}
                      >
                        {ex.name}
                      </span>
                    ))}
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button
                      className="btn btn-ghost btn-sm"
                      style={{ flex: 1 }}
                    >
                      Переглянути
                    </button>
                    <button
                      className="btn btn-primary btn-sm"
                      style={{ flex: 1 }}
                      onClick={() => onStart(p)}
                    >
                      <IcoPlay size={14} sw={2} /> Почати
                    </button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      }

      // ── App ───────────────────────────────────────────────────────────────────
      function App() {
        const [tab, setTab] = useState("home");
        const [view, setView] = useState("home"); // home | workout | summary
        const [selectedProgram, setSelectedProgram] = useState(null);
        const [summary, setSummary] = useState(null);

        const startWorkout = (prog) => {
          setSelectedProgram(prog);
          setView("workout");
        };
        const finishWorkout = (stats) => {
          setSummary(stats);
          setView("summary");
        };
        const exitToHome = () => {
          setView("home");
          setTab("home");
          setSummary(null);
          setSelectedProgram(null);
        };

        const showNav = view === "home";

        let screen;
        if (view === "workout")
          screen = (
            <WorkoutScreen
              program={selectedProgram}
              onExit={() => setView("home")}
              onFinish={finishWorkout}
            />
          );
        else if (view === "summary")
          screen = <SummaryScreen stats={summary} onHome={exitToHome} />;
        else if (tab === "home") screen = <HomeScreen onStart={startWorkout} />;
        else if (tab === "progress") screen = <ProgressScreen />;
        else screen = <ProgramsScreen onStart={startWorkout} />;

        const navItems = [
          { id: "home", label: "Тренування", Icon: IcoDumbbell },
          { id: "progress", label: "Прогрес", Icon: IcoChart },
          { id: "programs", label: "Програми", Icon: IcoLayers },
        ];

        return (
          <div className="stage">
            <div className="app">
              <div
                style={{
                  flex: 1,
                  display: "flex",
                  flexDirection: "column",
                  minHeight: 0,
                }}
              >
                {screen}
              </div>
              {showNav && (
                <div className="nav">
                  <div className="nav-inner">
                    {navItems.map(({ id, label, Icon }) => {
                      const active = tab === id;
                      return (
                        <button
                          key={id}
                          className="nav-btn"
                          data-active={active ? "1" : "0"}
                          onClick={() => {
                            setTab(id);
                            setView("home");
                          }}
                        >
                          <Icon size={20} sw={active ? 2 : 1.6} />
                          <span className="nav-label">{label}</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
